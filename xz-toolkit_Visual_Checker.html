function parseXZVersion(raw){const m=raw.match(/(\d+)\.(\d+)\.(\d+)/);if(!m)return null;return{major:parseInt(m[1]),minor:parseInt(m[2]),patch:parseInt(m[3]),str:m[0]};}

function checkVulnerability(xzRaw,lddRaw,sshdRaw){
  const checks=[];let vulnerable=true;
  const ver=parseXZVersion(xzRaw);
  if(!ver){checks.push({key:"xz",label:"XZ Utils version",status:"unknown",detail:"Could not parse version. Expected: xz (XZ Utils) 5.x.x"});vulnerable=false;}
  else{const bad=ver.major===5&&ver.minor===6&&(ver.patch===0||ver.patch===1);
    checks.push({key:"xz",label:"XZ Utils version",status:bad?"fail":"pass",detail:bad?`Version ${ver.str} is backdoored (5.6.0 and 5.6.1 contain the malicious payload).`:`Version ${ver.str} is not affected. Only 5.6.0 and 5.6.1 contain the backdoor.`});
    if(!bad)vulnerable=false;}
  const hasLzma=/liblzma/i.test(lddRaw);
  checks.push({key:"lzma",label:"liblzma linked into sshd",status:hasLzma?"fail":"pass",detail:hasLzma?"liblzma is present in sshd's dynamic library chain - the backdoor injection path exists.":"liblzma is NOT linked into sshd. The hook has no injection path. System not affected via this vector."});
  if(!hasLzma)vulnerable=false;
  const hasSystemd=/libsystemd/i.test(lddRaw);
  checks.push({key:"systemd",label:"libsystemd linked into sshd",status:hasSystemd?"fail":"pass",detail:hasSystemd?"libsystemd present. This distro applies the sd_notify patch to OpenSSH, creating the liblzma dependency.":"libsystemd NOT found. This distro does not patch OpenSSH with sd_notify - liblzma linkage is absent."});
  if(!hasSystemd)vulnerable=false;
  const hasGlibc=/libc\.so|glibc|libc-\d/i.test(lddRaw);
  checks.push({key:"glibc",label:"glibc present (IFUNC support)",status:hasGlibc?"fail":"pass",detail:hasGlibc?"glibc detected. IFUNC resolver mechanism available - required for the backdoor's function hook.":"glibc NOT detected (possibly musl). IFUNC is not supported - backdoor cannot execute."});
  if(!hasGlibc)vulnerable=false;
  const sshdActive=/^active/im.test(sshdRaw);
  checks.push({key:"sshd",label:"SSH daemon running",status:sshdActive?"fail":"pass",detail:sshdActive?"sshd is active. A running SSH daemon with the backdoored liblzma loaded is the final exploitation condition.":"sshd is not active. Even with the backdoored library present, there is no active attack surface."});
  if(!sshdActive)vulnerable=false;
  const xzVer=parseXZVersion(xzRaw);
  return{checks,vulnerable,systemProfile:{hasLzma,hasSystemd,hasGlibc,sshdActive,xzVersion:xzVer?.str||"unknown",xzBad:xzVer?(xzVer.major===5&&xzVer.minor===6&&(xzVer.patch===0||xzVer.patch===1)):false}};
}

function SystemChecker({onVisualise}){
  const [xz,setXz]=useState("");
  const [ldd,setLdd]=useState("");
  const [ssh,setSsh]=useState("");
  const [result,setResult]=useState(null);
  const run=useCallback(()=>{if(!xz.trim()&&!ldd.trim()&&!ssh.trim())return;setResult(checkVulnerability(xz,ldd,ssh));},[xz,ldd,ssh]);
  const reset=()=>{setXz("");setLdd("");setSsh("");setResult(null);};
  const TA=({label,cmd,value,onChange,ph})=>h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("span",{style:s.taLabel},label),h("span",{style:s.taCmd},cmd)),
    h("textarea",{value,onChange:e=>onChange(e.target.value),placeholder:ph,rows:3,style:s.textarea})
  );
  return h("div",{style:s.checkerGrid},
    h("div",{style:s.inputSide},
      h("div",null,
        h("div",{style:{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}},"System Vulnerability Checker"),
        h("div",{style:{fontSize:11,color:C.muted,lineHeight:1.7}},"Run the three commands on your target system and paste the output. The checker evaluates whether that system satisfies all five conditions for CVE-2024-3094 exploitation.")
      ),
      h("div",{style:s.cmdBox},
        h("div",{style:s.cmdLabel},"Commands to run"),
        ...CMDS.map((c,i)=>h("div",{key:i,style:s.cmdRow},h("span",{style:s.cmdName},c.label),h("span",{style:s.cmdVal},c.cmd)))
      ),
      h(TA,{label:"1. XZ Version",cmd:"xz --version",value:xz,onChange:setXz,ph:PLACEHOLDERS.xz}),
      h(TA,{label:"2. sshd ldd output",cmd:"ldd /usr/sbin/sshd",value:ldd,onChange:setLdd,ph:PLACEHOLDERS.ldd}),
      h(TA,{label:"3. SSH status",cmd:"systemctl is-active ssh",value:ssh,onChange:setSsh,ph:PLACEHOLDERS.sshd}),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{onClick:run,style:s.analyseBtn},"ANALYSE SYSTEM"),

          h("div",{style:s.verdictTitle(result.vulnerable)},result.vulnerable?"VULNERABLE":"NOT VULNERABLE"),
          h("div",{style:{fontSize:11,color:C.muted,lineHeight:1.6}},result.vulnerable
            ?"This system satisfies all conditions for exploitation of CVE-2024-3094. The backdoored liblzma is loaded into sshd and the IFUNC hook path is complete. Immediate downgrade to XZ 5.4.6 required."
            :"This system does not satisfy all conditions for exploitation. At least one critical dependency in the attack chain is absent.")
        ),
        h("button",{onClick:()=>onVisualise(result.systemProfile),style:s.visualBtn},"⬡ VISUALISE THIS SYSTEM'S DEPENDENCY CHAIN"),
        h("div",{style:s.iamNote},"Condition Breakdown"),

  const accentOf=(p)=>p.color==="red"?C.red:p.color==="yellow"?C.yellow:p.color==="green"?C.green:C.blue;
  const effectivePhase=systemProfile?null:phase;
  return h("div",{style:s.body},

      systemProfile&&h("div",{style:s.liveBox},
        h("div",{style:s.liveLabel},"Live System View"),

        h("button",{onClick:onClearProfile,style:s.clearBtn},"CLEAR - SHOW GENERIC CHAIN")

        ...g.indices.map(i=>{
          const p=phases[i];const ac=accentOf(p);const isAct=active===i&&!systemProfile;
          return h("div",{key:i,onClick:()=>{setActive(i);if(systemProfile)onClearProfile();},style:s.phaseItem(isAct,ac)},
            h("div",{style:s.phaseDot(isAct,ac)}),
            h("div",null,
              h("div",{style:s.phaseDate},p.eyebrow.split("·")[0].trim()),
              h("div",{style:s.phaseTitle},p.heading)
            )
          );
        }),
        gi<phaseGroups.length-1&&h("div",{style:s.divider})
      ))
    ),
    h("div",{style:s.canvas},
      h("div",{style:s.canvasTitle},systemProfile?`Live System - XZ ${systemProfile.xzVersion}`:phase.heading),
      h("div",{style:{width:"100%",maxWidth:490}},h(ChainSVG,{phase:effectivePhase,systemProfile})),
      !systemProfile&&phase.showMatrix&&h(VulnMatrix)
    ),
    h("div",{style:s.infoPanel},
      systemProfile?h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        h("div",null,
          h("div",{style:{...s.eyebrow,color:C.blue}},"Live System Profile"),
          h("div",{style:s.infoTitle},"Your System's Dependency Chain"),
          h("div",{style:s.infoBody},"The chain diagram reflects the actual libraries present on your system as reported by ldd. Dimmed nodes are absent. Highlighted nodes are active.")
        ),
        h("div",{style:s.divLine}),
        ...[
          {label:"XZ Version",value:systemProfile.xzVersion,bad:systemProfile.xzBad},
          {label:"liblzma linked",value:systemProfile.hasLzma?"YES":"NO",bad:systemProfile.hasLzma},
          {label:"libsystemd",value:systemProfile.hasSystemd?"YES":"NO",bad:systemProfile.hasSystemd},
          {label:"glibc (IFUNC)",value:systemProfile.hasGlibc?"YES":"NO",bad:systemProfile.hasGlibc},
          {label:"sshd active",value:systemProfile.sshdActive?"YES":"NO",bad:systemProfile.sshdActive},
        ].map((r,i)=>h("div",{key:i,style:s.profileRow},
          h("span",{style:s.profileLabel},r.label),
          h("span",{style:s.profileVal(r.bad)},r.value)
        )),
        h("div",{style:s.divLine}),
        h("div",{style:{fontSize:11,color:C.muted,lineHeight:1.7}},"Click any phase in the left panel to switch back to the generic attack visualiser.")
      ):h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
        h("div",null,
          h("div",{style:s.eyebrow},phase.eyebrow),
          h("div",{style:s.infoTitle},phase.heading),
          h("div",{style:s.infoBody},...phase.body.split("\n").map((line,i,arr)=>h("span",{key:i},line,i<arr.length-1&&h("br"))))
        ),
        phase.code&&h(CodeBlock,{lines:phase.code}),
        phase.tags&&phase.tags.length>0&&h("div",{style:s.tagRow},...phase.tags.map(([c,l],i)=>h(Tag,{key:i,color:c,label:l}))),
        phase.iam&&h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          h("div",{style:s.divLine}),
          h("div",{style:s.iamNote},"IAM Note"),
          h("div",{style:s.infoBody},h("span",{style:{color:C.text,fontWeight:500}},phase.iam.control),h("br"),h("br"),phase.iam.failure)
        ),
        phase.showIAMTable&&h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          h("div",{style:s.divLine}),
          h("div",{style:s.iamNote},"Control Effectiveness"),
          h(IAMTable)
        )
      )
    )
  );
}

function App(){
  const [tab,setTab]=useState("visualiser");
  const [systemProfile,setSystemProfile]=useState(null);
  const handleVisualise=(profile)=>{setSystemProfile(profile);setTab("visualiser");};
  const TabBtn=({id,label})=>h("button",{onClick:()=>setTab(id),style:s.tab(tab===id)},label);
  return h("div",{style:s.page},
    h("div",{style:s.hdr},
      h("span",{style:s.badge(C.red,"none","#fff")},"CVE-2024-3094"),
      h("span",{style:s.badge("transparent",`1px solid ${C.red}`,C.red)},"CVSS 10.0"),
      h("span",{style:{fontFamily:"monospace",fontSize:12,fontWeight:600,color:C.text,flex:1}},"XZ Utils Backdoor - Research Toolkit"),
      systemProfile&&tab==="visualiser"&&h("span",{style:s.badge("rgba(88,166,255,.15)","1px solid rgba(88,166,255,.3)",C.blue)},"LIVE SYSTEM VIEW"),
      h("div",{style:s.tabWrap},h(TabBtn,{id:"visualiser",label:"ATTACK VISUALISER"}),h(TabBtn,{id:"checker",label:"SYSTEM CHECKER"}))
    ),
    tab==="checker"
      ?h(SystemChecker,{onVisualise:handleVisualise})
      :h(Visualiser,{systemProfile,onClearProfile:()=>setSystemProfile(null)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
